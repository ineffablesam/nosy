# The Fly Dashboard selects the app for this repository deployment.
# Add `app = "your-fly-app-name"` here only if you later deploy with flyctl.
app = 'nosy-srddmq'
primary_region = "iad"

[build]
  builder = "paketobuildpacks/builder-jammy-base"

[processes]
  app = "npm start"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  SOCKET_MODE = "true"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
