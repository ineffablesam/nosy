display_information:
  name: Nosy
  description: The AI that's been watching your workspace and has opinions about it
  background_color: "#1a1a2e"

features:
  bot_user:
    display_name: Nosy
    always_online: true
  slash_commands:
    - command: /nosy
      description: Watch this thread (run inside thread) or this whole channel (run in channel)
      usage_hint: "(run in a thread or channel)"
      should_escape: false

oauth_config:
  scopes:
    bot:
      - channels:history
      - groups:history
      - im:history
      - im:read
      - im:write
      - chat:write
      - commands
      - users:read

settings:
  event_subscriptions:
    bot_events:
      - message.channels
      - message.groups
      - message.im
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
